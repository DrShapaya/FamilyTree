# Example config for a named Cloudflare Tunnel.
# Copy this to your cloudflared config directory after creating a tunnel,
# then replace the tunnel id, credentials file, and hostname.

tunnel: YOUR_TUNNEL_ID
credentials-file: "C:\\Users\\YOUR_WINDOWS_USER\\.cloudflared\\YOUR_TUNNEL_ID.json"

ingress:
  - hostname: tree.drshapaya.ru
    service: http://127.0.0.1:8785
  - service: http_status:404
